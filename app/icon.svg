<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="mic" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#e0e0ff"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="256" height="256" rx="48" ry="48" fill="url(#bg)"/>
  <!-- Microphone body -->
  <rect x="100" y="52" width="56" height="88" rx="28" ry="28" fill="url(#mic)"/>
  <!-- Microphone stand arc -->
  <path d="M 80 120 Q 80 172 128 172 Q 176 172 176 120" fill="none" stroke="white" stroke-width="8" stroke-linecap="round"/>
  <!-- Microphone stand vertical -->
  <line x1="128" y1="172" x2="128" y2="196" stroke="white" stroke-width="8" stroke-linecap="round"/>
  <!-- Microphone base -->
  <line x1="104" y1="196" x2="152" y2="196" stroke="white" stroke-width="8" stroke-linecap="round"/>
  <!-- Sparkle top-right -->
  <g transform="translate(188, 48)" fill="#fbbf24">
    <path d="M 0,-14 L 3,-3 L 14,0 L 3,3 L 0,14 L -3,3 L -14,0 L -3,-3 Z"/>
  </g>
  <!-- Sparkle small -->
  <g transform="translate(56, 68)" fill="#fbbf24" opacity="0.8">
    <path d="M 0,-8 L 2,-2 L 8,0 L 2,2 L 0,8 L -2,2 L -8,0 L -2,-2 Z"/>
  </g>
  <!-- Code brackets hint -->
  <text x="60" y="218" font-family="monospace" font-size="28" font-weight="bold" fill="white" opacity="0.5">&lt;/&gt;</text>
</svg>
